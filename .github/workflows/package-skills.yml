name: Package Skills

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  package-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package skill zips
        run: bash scripts/package-skills.sh

      - name: Verify zip contents
        run: |
          set -euo pipefail
          for zip_file in dist/deepcoin-*.zip; do
            echo "== $zip_file =="
            unzip -Z1 "$zip_file" | tee /tmp/zip-list.txt
            grep -qx "SKILL.md" /tmp/zip-list.txt
            grep -qx "references/" /tmp/zip-list.txt
            if grep -Evqx "SKILL.md|references/|references/[^/]+\\.md" /tmp/zip-list.txt; then
              echo "$zip_file contains files outside SKILL.md and references/*.md" >&2
              exit 1
            fi
          done

      - name: Verify committed zips are current
        run: |
          set -euo pipefail
          bash scripts/package-skills.sh --check

      - name: Upload skill zips
        uses: actions/upload-artifact@v4
        with:
          name: deepcoin-skills-zips
          path: dist/*.zip

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
